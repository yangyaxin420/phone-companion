<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;}

/* ===== 手机壳 ===== */
.phone-frame{
  width:390px;height:750px;max-height:100dvh;
  margin:30px auto;
  border-radius:40px;
  background:#f8f8f8;
  overflow:hidden;
  box-shadow:0 0 0 8px #1e1e1e,0 20px 60px rgba(0,0,0,.25);
  display:flex;flex-direction:column;
  position:relative;
}

    linear-gradient(165deg, #F3E8FF 0%, #FAE8FF 30%, #FDF2F8 70%, #F3E8FF 100%);
  background-size: cover, cover;
  pointer-events:none;
  z-index:0;
}

/* ===== 状态栏 ===== */
.status-bar{
  position:relative;z-index:2;
  height:32px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;font-weight:600;color:#6B21A8;
  flex-shrink:0;
}

/* ===== 聊天头部 ===== */
.chat-header{
  position:relative;z-index:2;
  padding:12px 16px;
  background:rgba(255,255,255,.68);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(216,180,254,.3);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.chat-header .avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#E9D5FF,#D8B4FE);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 2px 8px rgba(168,85,247,.25);
}
.chat-header .info{flex:1;}
.chat-header .name{font-size:15px;font-weight:600;color:#4C1D95;}
.chat-header .status{font-size:11px;color:#A855F7;}
.chat-header .status .sb-typing{
  font-size:11px;color:#C084FC;font-weight:400;
  animation:pulseText 2s ease-in-out infinite;
}
@keyframes pulseText{0%,100%{opacity:.6}50%{opacity:1}}
.chat-header .actions{font-size:20px;color:#A855F7;cursor:default;letter-spacing:4px;}

/* ===== 消息列表 ===== */
.chat-body{
  position:relative;z-index:2;
  flex:1;overflow-y:auto;padding:16px 8px;
  display:flex;flex-direction:column;gap:14px;
}

/* ===== 消息气泡 ===== */
.message{
  display:flex;align-items:flex-end;gap:6px;
  width:100%;
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* 对方消息：头像在最左 */
.message.them{justify-content:flex-start;}
/* 我的消息：头像在最右，紧贴手机边框 */
.message.me{justify-content:flex-end;}

.msg-body{max-width:70%;display:flex;flex-direction:column;}

.msg-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.message.them .msg-avatar{
  background:linear-gradient(135deg,#E9D5FF,#D8B4FE);
}
.message.me .msg-avatar{
  background:linear-gradient(135deg,#F472B6,#EC4899);
  box-shadow:0 2px 6px rgba(236,72,153,.25);
  /* 头像固定在右边，无margin */
}

.msg-bubble{
  padding:10px 14px;
  border-radius:16px;
  font-size:14px;line-height:1.6;
  position:relative;
  word-break:break-word;
}

/* 对方气泡（左） — 纯白 */
.message.them .msg-bubble{
  background:#FFFFFF;
  color:#4A1D96;
  border-bottom-left-radius:4px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
}

/* 我的气泡（右） — 粉嫩渐变 */
.message.me .msg-bubble{
  background:linear-gradient(135deg,#FDF2F8,#FCE7F3);
  color:#831843;
  border-bottom-right-radius:4px;
  box-shadow:0 2px 8px rgba(244,114,182,.15);
}

.msg-time{
  font-size:10px;color:#A78BFA;
  margin:2px 4px 0 4px;
  white-space:nowrap;
}
.message.me .msg-time{text-align:right;}
.message.them .msg-time{padding-left:4px;}

/* ===== 系统消息 ===== */
.system-msg{
  text-align:center;font-size:11px;color:#A78BFA;
  padding:4px 0;
  position:relative;z-index:2;
}

/* ===== 输入栏 ===== */
.chat-input-bar{
  position:relative;z-index:2;
  padding:10px 14px;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(216,180,254,.3);
  display:flex;align-items:flex-end;gap:8px;
  flex-shrink:0;
}
.chat-input-bar input{
  flex:1;height:40px;
  border:1px solid #E9D5FF;
  border-radius:20px;
  padding:0 16px;
  font-size:14px;color:#4C1D95;
  background:#FFFFFF;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.chat-input-bar input:focus{
  border-color:#D8B4FE;
  box-shadow:0 0 0 3px rgba(216,180,254,.25);
}
.chat-input-bar input::placeholder{color:#C4B5FD;}
.chat-input-bar .plus-btn{
  width:36px;height:36px;border-radius:50%;
  background:#F3E8FF;
  border:none;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#7E22CE;flex-shrink:0;
  transition:background .15s;
}
.chat-input-bar .plus-btn:hover{background:#E9D5FF;}
.chat-input-bar .send-btn{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#E9D5FF,#D8B4FE);
  border:none;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#FFFFFF;flex-shrink:0;
  box-shadow:0 2px 8px rgba(168,85,247,.3);
  transition:transform .15s,box-shadow .15s;
}
.chat-input-bar .send-btn:hover{
  transform:scale(1.05);
  box-shadow:0 3px 12px rgba(168,85,247,.4);
}
.chat-input-bar .send-btn:active{transform:scale(.95);}

/* ===== 分割线 ===== */
.divider{
  text-align:center;font-size:11px;color:#C4B5FD;
  position:relative;z-index:2;
  padding:4px 0;
}
.divider::before,.divider::after{
  content:'';position:absolute;top:50%;
  width:60px;height:1px;
}
.divider::before{left:20px;background:linear-gradient(90deg,transparent,#D8B4FE);}
.divider::after{right:20px;background:linear-gradient(270deg,transparent,#D8B4FE);}

/* ===== 已读标记 ===== */
.read-status{
  font-size:9px;color:#A78BFA;text-align:right;
  margin-top:1px;padding-right:2px;
}
</style>
</head>
